<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il mio rettilario</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header>
    <div class="headerInner">
      <div class="header-row">
        <div>
          <h1>🐍 Il mio rettilario</h1>
          <p class="sottotitolo">Cerca serpenti nel catalogo e aggiungili alla tua collezione.</p>
        </div>
        <div id="auth-box" class="auth-box"></div>
      </div>
    </div>
  </header>

  <section id="profilo-section" class="profilo-section" hidden>
    <h2>Il tuo profilo</h2>
    <div id="profilo" class="profilo"></div>
  </section>

  <main class="container">

    <!-- sezione cerca -->
    <section class="cerca-section">
      <h2>Cerca nel catalogo</h2>
      <div class="campo">
        <label for="cerca">Cerca un serpente</label>
        <input type="text" id="cerca" placeholder="es. pitone, cobra, boa...">
      </div>
      <div id="spinner" class="spinner" hidden>Caricamento in corso...</div>
      <div id="errore" class="alert-danger" hidden></div>
      <ul id="risultati" class="risultati"></ul>
    </section>

    <!-- rettilario personale -->
    <section class="lista-section">
      <div class="lista-header">
        <h2>Il mio rettilario &nbsp;<span id="contatore">0</span></h2>
        <button id="svuota-tutto" class="btn-svuota">Svuota tutto</button>
      </div>
      <p class="info-storage">I rettili sono salvati nel browser e sopravvivono al refresh.</p>

      <div class="controlli">
        <div class="controlli-row" id="filtri-famiglia">
          <button class="btn-filtro attivo" data-filtro="tutti">Tutti</button>
          <button class="btn-filtro" data-filtro="nonestinti">Non estinti</button>
          <button class="btn-filtro" data-filtro="estinti">Estinti</button>
        </div>
        <div class="controlli-row">
          <span class="label-controllo">Ordina:</span>
          <select id="selectOrdine">
            <option value="nome-az">Nome A-Z</option>
            <option value="nome-za">Nome Z-A</option>
            <option value="anno">Anno</option>
          </select>
        </div>
      </div>

      <ul id="lista-rettili"></ul>
    </section>

  </main>

  <footer>
    <p>Il mio rettilario — Yhara Landi &copy; 2026</p>
  </footer>

  <script src="assets/script/script.js"></script>
</body>
</html>
